title: neurons.me
description: Shared docs home and remote theme source for .me.
theme: minima
baseurl:
url: https://neurons-me.github.io/neurons-me/

markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  hard_wrap: false

me_theme:
  brand: neurons.me
  nav:
    - label: Home
      url: https://neurons-me.github.io/
    - label: Github
      url: https://github.com/neurons-me
    - label: .me
      relative_url: https://neurons-me.github.io/.me
